name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Install Git LFS and track pkl files
        run: |
          git lfs install
          git lfs track "*.pkl"
          git add .gitattributes
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --cached --quiet || git commit -m "Track pkl files with Git LFS"
      - name: Fetch HF Space history and push
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://logn1602:$HF_TOKEN@huggingface.co/spaces/logn1602/newswise-ai || true
          git fetch space main --depth=1 || true
          git push -f space main
